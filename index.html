<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c2e">
    <title>App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Основная область: iframe + слои loader/fallback -->
    <main class="app-main">
        <div class="loader-wrap" id="loader">
            <div class="spinner" aria-hidden="true"></div>
            <p class="loader-text">Загружаем...</p>
        </div>

        <div class="fallback" id="fallback" hidden>
            <div class="fallback-icon" aria-hidden="true">⚠️</div>
            <h2 class="fallback-title">Не удалось загрузить</h2>
            <p class="fallback-text">Проверьте соединение или откройте в браузере.</p>
            <button class="fallback-btn" id="openBrowserBtn" type="button">
                Открыть в браузере
            </button>
        </div>

        <iframe id="appFrame"
                class="app-frame"
                title="App content"
                allow="clipboard-read; clipboard-write; payment *; fullscreen"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
    </main>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
